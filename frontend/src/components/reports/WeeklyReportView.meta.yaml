pattern_notes:
  type: "multi-question atom (composer)"
  notes: |
    Mega-composer вҖ” 22KB, ~440 lines, 10+ sub-sections. IA spec В§4 м¶”к°ҖкІ°м • per handoff:
    "WeeklyReportView is a 22KB mega-composer вҖ” flag as composer/whole-page atom; don't
    fragment". Inline helpers(ASSET_TO_TICKER, SEVERITY_CONFIG) carry legacy ticker
    residue (TIGER_2X, KODEX_1X mapped to QQQ) вҖ” flagged in 885 observation for
    DOMAIN_MAP single-source-of-truth migration. props-driven framingмқҖ archiveмҷҖ
    friday л‘җ surfaceлҘј single componentлЎң coverн•ҳлҠ” лӘ…мӢңм Ғ нҢЁн„ҙ вҖ” Phase 2 split
    candidateк°Җ м•„лӢҢ, *deliberate sharing*. Recharts-heavy мһҗмӢқл“Ө(AssetSignalSection,
    MSTRSignalSection)мқ„ SuspenseлЎң wrapн•ҳм—¬ lazy-render вҖ” single-pageм—җ 10+ Card +
    multiple chartsлқјлҠ” л¬ҙкІҢлҘј mitigation. Aesthetic uplift(Phase 4) entry pointлЎң
    к°ҖмһҘ нҒ° surface area.

