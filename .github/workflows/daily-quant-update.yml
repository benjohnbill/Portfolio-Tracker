name: Daily Quant Update (ELT Pipeline)

on:
  schedule:
    # Run every day at 21:00 UTC (which is 06:00 KST next day, safely after US market close)
    - cron: '0 21 * * 1-5' # Runs Mon-Fri UTC (Tue-Sat morning KST)
  workflow_dispatch: # Allow manual triggering from GitHub UI

jobs:
  update-signals:
    runs-on: ubuntu-latest
    env:
      BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
    steps:
      - name: Validate workflow configuration
        run: |
          test -n "$BACKEND_BASE_URL"

      - name: Trigger Render Backend ELT Pipeline
        id: trigger
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt of 3..."
            if curl --fail --show-error --silent -X POST "${BACKEND_BASE_URL}/api/cron/update-signals" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              -H "Content-Type: application/json"; then
              echo "Daily Quant Update triggered successfully at $(date)"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "Attempt $attempt failed. Waiting 30 seconds before retry..."
              sleep 30
            fi
          done
          echo "All 3 attempts failed"
          exit 1
