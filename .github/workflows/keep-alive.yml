name: Keep-Alive Portfolio Backend

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Portfolio Backend
        run: |
          curl -s https://portfolio-tracker-f8a3.onrender.com/api/assets > /dev/null
          echo "Backend pinged at $(date)"
