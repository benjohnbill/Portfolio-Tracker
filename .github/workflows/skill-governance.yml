name: Skill Governance

on:
  push:
    paths:
      - "skills/**"
      - "tools/check_skill_registry.py"
      - ".github/workflows/skill-governance.yml"
  pull_request:
    paths:
      - "skills/**"
      - "tools/check_skill_registry.py"
      - ".github/workflows/skill-governance.yml"

jobs:
  validate-skill-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate skill registry
        run: python tools/check_skill_registry.py --mode strict
