    via: page.tsx (Suspense wrapped)

pattern_notes:
  type: "data-fetcher atom — symmetric to outcomes/reviews sections"

keywords:
  - "[[data-fetcher]]"
  - "[[envelope]]"
  - "[[rule-accuracy]]"
